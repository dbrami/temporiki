name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
      - name: Install deps
        run: uv sync --project .temporiki --extra dev --extra chroma-client
      - name: Ruff
        run: uv --project .temporiki run ruff check .temporiki
      - name: Ty
        run: uv --project .temporiki run ty check .temporiki/temporiki_tools
      - name: Run tests
        run: uv --project .temporiki run python -m pytest -q .temporiki/tests

  github-release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
