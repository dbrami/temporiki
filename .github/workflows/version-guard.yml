name: Version Guard

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run version guard (PR)
        if: github.event_name == 'pull_request'
        run: ./.temporiki/scripts/check_version_guard.sh "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"
      - name: Run version guard (push)
        if: github.event_name == 'push'
        run: ./.temporiki/scripts/check_version_guard.sh "${{ github.event.before }}" "${{ github.sha }}"
